<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>저몰입환자</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  
  <div id="container">
    <div id="content">

      <header style="position: relative;"> <div class="user-section back-black">
          <div id="user-info"></div>
          <button id="login-btn" class="login-btn" style="display:none;">로그인</button>
          <button id="logout-btn" class="logout-btn" style="display:none;">로그아웃</button>
        </div>  

        <button id="menu-toggle" class="menu-toggle">☰</button>

        <div class="menu back-black">
          <nav id="main-nav" class="nav-container">
            <p class="menu-btn"><a href="pages/home.html" target="main">Main</a></p>
            <p class="menu-btn"><a href="pages/oc.html" target="main">OC</a></p>
            <p class="menu-btn"><a href="pages/pair.html" target="main">Pair</a></p>
            <p class="menu-btn"><a href="pages/text.html" target="main">Text</a></p>
            <p class="menu-btn"><a href="pages/imgbackup.html" target="main">img</a></p>
            <p class="menu-btn"><a href="pages/guest.html" target="main">Guest</a></p>
          </nav>
        </div>
      </header>

      <div class="main-content back-black">
        <iframe src="pages/home.html" name="main" id="main" style="width: 100%; height: 100%; border:none;"></iframe>
      </div>

    </div>
  </div>

  <div id="auth-modal" class="auth-modal">
    <div class="auth-modal-content">
      <div class="auth-modal-header">
        <h2 id="auth-modal-title">로그인</h2>
        <button class="auth-close-btn" onclick="closeAuthModal()">✕</button>
      </div>
      <div id="auth-error" class="auth-error"></div>
      <div id="login-form">
        <div class="auth-form-group">
          <label>이메일</label>
          <input type="email" id="login-email" placeholder="이메일을 입력하세요">
        </div>
        <div class="auth-form-group">
          <label>비밀번호</label>
          <input type="password" id="login-password" placeholder="비밀번호를 입력하세요">
        </div>
        <div class="auth-buttons">
          <button class="auth-btn auth-btn-primary" onclick="handleLogin()">로그인</button>
          <button class="auth-btn auth-btn-secondary" onclick="closeAuthModal()">닫기</button>
        </div>
        <div class="auth-toggle-link">계정이 없으신가요? <a onclick="toggleAuthForm()">회원가입</a></div>
      </div>
      <div id="signup-form" style="display: none;">
        <div class="auth-form-group">
          <label>이메일</label>
          <input type="email" id="signup-email">
        </div>
        <div class="auth-form-group">
          <label>비밀번호</label>
          <input type="password" id="signup-password">
        </div>
        <div class="auth-form-group">
          <label>닉네임</label>
          <input type="text" id="signup-name">
        </div>
        <div class="auth-buttons">
          <button class="auth-btn auth-btn-primary" onclick="handleSignup()">회원가입</button>
          <button class="auth-btn auth-btn-secondary" onclick="closeAuthModal()">닫기</button>
        </div>
        <div class="auth-toggle-link">이미 계정이 있으신가요? <a onclick="toggleAuthForm()">로그인</a></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { firebaseConfig } from "./script/firebase-config.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const ADMIN_EMAILS = ["jayler13579@gmail.com"];

    async function getUserRole(user) {
      return ADMIN_EMAILS.includes(user.email) ? 'admin' : 'user';
    }

    // 1. 로그인 상태 감지
    onAuthStateChanged(auth, async (user) => {
      const userInfo = document.getElementById('user-info');
      const loginBtn = document.getElementById('login-btn');
      const logoutBtn = document.getElementById('logout-btn');

      if (user) {
        const role = await getUserRole(user);
        window.currentUser = { uid: user.uid, displayName: user.displayName, email: user.email, role: role };
        userInfo.innerHTML = `<span>${user.displayName}</span>`;
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'block';
      } else {
        window.currentUser = null;
        userInfo.innerHTML = '';
        loginBtn.style.display = 'block';
        logoutBtn.style.display = 'none';
      }
    });

    // 2. 모달 관련 함수들
    window.openAuthModal = () => { document.getElementById('auth-modal').classList.add('active'); };
    window.closeAuthModal = () => { document.getElementById('auth-modal').classList.remove('active'); };
    window.toggleAuthForm = () => {
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const isLogin = loginForm.style.display !== 'none';
      loginForm.style.display = isLogin ? 'none' : 'block';
      signupForm.style.display = isLogin ? 'block' : 'none';
      document.getElementById('auth-modal-title').textContent = isLogin ? '회원가입' : '로그인';
    };

    // 3. 로그인/회원가입/로그아웃 처리
    window.handleLogin = async () => {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        closeAuthModal();
      } catch (error) { alert(error.message); }
    };

    window.handleSignup = async () => {
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const name = document.getElementById('signup-name').value;
      try {
        const res = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(res.user, { displayName: name });
        closeAuthModal();
      } catch (error) { alert(error.message); }
    };

    window.handleLogout = async () => { await signOut(auth); };

    // 4. 이벤트 연결 (중요!)
    document.getElementById('login-btn').onclick = openAuthModal;
    document.getElementById('logout-btn').onclick = handleLogout;

    // --- 햄버거 메뉴 로직 시작 ---
    const menuToggle = document.getElementById('menu-toggle');
    const menuContainer = document.querySelector('.menu');

    if (menuToggle && menuContainer) {
      menuToggle.onclick = () => {
        menuContainer.classList.toggle('active'); // active 클래스 뗐다 붙였다 하기
        menuToggle.textContent = menuContainer.classList.contains('active') ? '✕' : '☰';
      };

      // 메뉴 클릭하면 닫히게 (모바일용)
      const menuLinks = menuContainer.querySelectorAll('a');
      menuLinks.forEach(link => {
        link.onclick = () => {
          if (window.innerWidth <= 640) {
            menuContainer.classList.remove('active');
            menuToggle.textContent = '☰';
          }
        };
      });
    }
    // --- 햄버거 메뉴 로직 끝 ---

    // 모달 배경 클릭 시 닫기
    window.onclick = (event) => {
      if (event.target.id === 'auth-modal') closeAuthModal();
    };


    // 헤더 높이를 계산해서 적용하는 함수
function updateContentHeight() {
  const header = document.querySelector('header');
  if (header) {
    const headerHeight = header.offsetHeight; // 헤더의 실제 높이를 픽셀로 가져옴
    // body 태그에 --header-height라는 변수를 전달함
    document.body.style.setProperty('--header-height', headerHeight + 'px');
  }
}

// 1. 페이지가 처음 열릴 때 실행
updateContentHeight();

// 2. 화면 크기가 바뀔 때마다 다시 실행 (가로/세로 전환 대비)
window.addEventListener('resize', updateContentHeight);

// 3. 햄버거 메뉴를 누를 때 실행 (메뉴가 펼쳐지면서 헤더가 길어질 수 있으므로)
const toggleBtn = document.getElementById('menu-toggle');
if (toggleBtn) {
  toggleBtn.addEventListener('click', () => {
    // 메뉴 애니메이션 시간을 고려해 살짝 뒤에 계산
    setTimeout(updateContentHeight, 300); 
  });
}
  </script>
</body>
</html>
