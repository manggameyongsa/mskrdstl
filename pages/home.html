<link rel="stylesheet" href="../styles/common.css">
<style>
  .board-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-title);
    padding-bottom: 10px;
  }

  .board-header h1 { margin: 0; }

  /* 글쓰기 모달 (관리자용) */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: var(--modal-back-color);
    overflow: auto;
  }
  .modal.active { display: flex; justify-content: center; align-items: center; }

  /* 게시글 리스트 스타일 */
  .gallery {
    display: flex;
    flex-direction: column;
    gap: 12px; /* 게시글 사이 간격 */
    margin: 0 auto;
  }

  .post-item {
    display: flex;
    flex-direction: column;
    background: var(--post-item-background-color);
    padding: 12px;
    border: var(--button-border);
    box-sizing: border-box;
  }

  .post-header { margin-bottom: 20px; }
  .main-title { display: block; font-weight: bold; font-size: 18pt; margin-bottom: 5px; color: var(--basic-text-color); }
  .main-subtitle { display: block; font-size: 12pt; color:var(--color-dark); }
  
  /* 게시글 본문 스타일 */
  .post-body {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .post-image {
    max-width: 100%;
    height: auto;
    align-self: flex-start; /* 이미지 왼쪽 정렬 */
  }

  .post-full-content {
    font-size: 12pt;
    line-height: 1.6;
    white-space: pre-wrap; /* 줄바꿈 그대로 표시 */
    word-wrap: break-word;
  }

  /* 관리자 전용 버튼 스타일 */
  .post-admin-controls {
    display: flex;
    gap: 10px;
    margin-top: 15px;
    justify-content: flex-end;
  }

</style>

<main>
  <div class="board-header">
    <h1>저몰입환자의 방</h1>
    <button id="write-btn" class="write-btn" style="display:none;">글쓰기</button>
  </div>

  <div id="gallery" class="gallery"></div>

  <template id="post-template">
    <div class="post-item">
      <div class="post-header">
        <span class="main-title"></span>
        <span class="main-subtitle"></span>
      </div>
      <div class="post-body">
        <img class="post-image" style="display:none;">
        <div class="post-full-content"></div>
      </div>
      <div class="post-admin-controls" style="display:none;">
        <button class="btn btn-edit">수정</button>
        <button class="btn btn-delete">삭제</button>
      </div>
    </div>
  </template>

  <div id="write-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 id="modal-title">새 글쓰기</h2>
        <button class="close-btn" onclick="closeWriteModal()">✕</button>
      </div>
      <form onsubmit="handleSavePost(event)">
        <div class="form-group">
          <label>제목 *</label>
          <input type="text" id="post-title" required>
        </div>
        <div class="form-group">
          <label>부제목</label>
          <input type="text" id="post-subtitle">
        </div>
        <div class="form-group">
          <label>내용 *</label>
          <textarea id="post-content" required style="min-height: 200px;"></textarea>
        </div>
        <div class="form-group">
          <label>이미지 URL</label>
          <input type="url" id="post-image">
        </div>
        <div class="form-buttons" style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" class="btn btn-cancel" onclick="closeWriteModal()">취소</button>
          <button type="submit" class="btn btn-submit">등록</button>
        </div>
      </form>
    </div>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, serverTimestamp, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCmAeayjJDPHIA03uhxj38tfzg1VD57NTA",
    authDomain: "yongsa-oc.firebaseapp.com",
    projectId: "yongsa-oc",
    storageBucket: "yongsa-oc.appspot.com",
    messagingSenderId: "942437036530",
    appId: "1:942437036530:web:7854c166440aa905cebb6b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let currentUser = null;
  let editingPostId = null;
  let allPosts = {};

  async function getUserRole(userId) {
    try {
      const userDoc = await getDoc(doc(db, 'users', userId));
      return userDoc.exists() ? userDoc.data().role : 'user';
    } catch { return 'user'; }
  }

  onAuthStateChanged(auth, async (user) => {
    const writeBtn = document.getElementById('write-btn');
    if (user) {
      const role = await getUserRole(user.uid);
      currentUser = { uid: user.uid, role: role };
      writeBtn.style.display = role === 'admin' ? 'block' : 'none';
    } else {
      currentUser = null;
      writeBtn.style.display = 'none';
    }
    loadPosts();
  });

  window.openWriteModal = () => {
    editingPostId = null;
    document.getElementById('modal-title').textContent = '새 글쓰기';
    document.getElementById('post-title').value = '';
    document.getElementById('post-subtitle').value = '';
    document.getElementById('post-content').value = '';
    document.getElementById('post-image').value = '';
    document.getElementById('write-modal').classList.add('active');
  };

  window.closeWriteModal = () => document.getElementById('write-modal').classList.remove('active');

  window.openEditModal = (postId) => {
    const post = allPosts[postId];
    editingPostId = postId;
    document.getElementById('modal-title').textContent = '글 수정하기';
    document.getElementById('post-title').value = post.title || '';
    document.getElementById('post-subtitle').value = post.subtitle || '';
    document.getElementById('post-content').value = post.content || '';
    document.getElementById('post-image').value = post.imageUrl || '';
    document.getElementById('write-modal').classList.add('active');
  };

  window.handleSavePost = async (event) => {
    event.preventDefault();
    const data = {
      title: document.getElementById('post-title').value,
      subtitle: document.getElementById('post-subtitle').value,
      content: document.getElementById('post-content').value,
      imageUrl: document.getElementById('post-image').value,
      updatedAt: serverTimestamp()
    };

    try {
      if (editingPostId) {
        await updateDoc(doc(db, 'home_posts', editingPostId), data);
      } else {
        await addDoc(collection(db, 'home_posts'), { ...data, createdAt: serverTimestamp(), userId: currentUser.uid });
      }
      closeWriteModal();
    } catch (e) { alert(e.message); }
  };

  window.loadPosts = () => {
    const q = query(collection(db, 'home_posts'), orderBy('createdAt', 'asc'));
    onSnapshot(q, (snapshot) => {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      allPosts = {};
      const template = document.getElementById('post-template');

      snapshot.forEach((docSnap) => {
        const post = { ...docSnap.data(), id: docSnap.id };
        allPosts[post.id] = post;

        const item = template.content.cloneNode(true);
        const itemDiv = item.querySelector('.post-item');
        
        item.querySelector('.main-title').textContent = post.title;
        item.querySelector('.main-subtitle').textContent = post.subtitle || '';
        
        // 전문 링크 및 텍스트 처리
        item.querySelector('.post-full-content').innerHTML = linkify(post.content);

        // 이미지 처리
        const img = item.querySelector('.post-image');
        if (post.imageUrl) {
          img.src = post.imageUrl;
          img.style.display = 'block';
        }

        // 관리자 버튼 노출 처리
        if (currentUser && currentUser.role === 'admin') {
          const controls = item.querySelector('.post-admin-controls');
          controls.style.display = 'flex';
          item.querySelector('.btn-edit').onclick = () => openEditModal(post.id);
          item.querySelector('.btn-delete').onclick = () => deletePost(post.id);
        }

        gallery.appendChild(item);
      });
    });
  };

  window.deletePost = async (id) => {
    if (confirm('삭제하시겠습니까?')) {
      await deleteDoc(doc(db, 'home_posts', id));
    }
  };

  function linkify(text) {
    if (!text) return '';
    return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="post-link">LINK</a>');
  }

  document.getElementById('write-btn').onclick = openWriteModal;
</script>
