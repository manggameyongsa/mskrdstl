<link rel="stylesheet" href="../styles/common.css">
<style>
  /* 기존 스타일 유지 */
  .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-family: var(--font-title); }
  .board-header h1 { margin: 0; }
  .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: var(--modal-back-color); overflow: auto; }
  .modal.active { display: flex; justify-content: center; align-items: center; }
  .modal-content { background: #fff; padding: 25px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; border: 2px solid #333; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 12px; margin-bottom: 15px; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
  .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; }
  .form-group textarea { min-height: 100px; resize: vertical; }
  
  /* 이미지 입력 리스트 스타일 */
  .image-input-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .image-input-item { display: flex; gap: 5px; }
  .btn-add-img { background: #eee; border: 1px solid #ccc; padding: 5px 10px; cursor: pointer; font-size: 0.9em; margin-bottom: 10px; }
  .btn-remove-img { background: #ffeded; border: 1px solid #ffcccc; color: #ff0000; cursor: pointer; padding: 0 10px; }

  /* 갤러리 및 카드 */
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
  .post-card { overflow: hidden; cursor: pointer; transition: all 0.3s; background: #fff; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); border: 1px solid #eee; }
  .post-card:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2); }
  .post-thumbnail { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f4f4f4; }
  .post-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
  .post-info { padding: 12px; }
  .main-title { font-weight: bold; font-size: 13pt; display: block; margin-bottom: 5px; }
  .main-subtitle { font-size: 10pt; color: #666; display: block; text-align: right; }

  /* 상세 모달 내 이미지 리스트 */
  .detail-image-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .detail-image { width: 100%; height: auto; display: block; }
  .detail-subtitle { font-size: 12pt; color: #666; }
  .detail-content { line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
  .detail-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  @media (max-width: 768px) { .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
</style>

<main>
  <div class="board-header">
    <h1>Image Backup</h1>
    <button id="write-btn" class="write-btn" style="display:none;">글쓰기</button>
  </div>
    <div class="search-container">
      <input type="text" id="search-input" placeholder="제목, 부제목, 내용 검색..." >
      <button id="search-btn" class="btn">검색</button>
    </div>

  <template id="post-card-template">
    <div class="post-card">
      <div class="post-info">
        <span class="main-title"></span>
        <span class="main-subtitle"></span>
      </div>
      <div class="post-thumbnail"></div>
    </div>
  </template>

  <div id="gallery" class="gallery"></div>

  <div id="write-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">새 글쓰기</h2>
        <button class="close-btn" onclick="closeWriteModal()">✕</button>
      </div>
      <form onsubmit="handleSavePost(event)">
        <div class="form-group">
          <label>제목 *</label>
          <input type="text" id="post-title" required>
        </div>
        <div class="form-group">
          <label>부제목</label>
          <input type="text" id="post-subtitle">
        </div>
        <div class="form-group">
          <label>내용 (선택)</label>
          <textarea id="post-content"></textarea> </div>
        
        <div class="form-group">
          <label>이미지 링크들</label>
          <div id="image-input-container" class="image-input-list">
            </div>
          <button type="button" class="btn-add-img" onclick="addImageInput()">+ 이미지 추가</button>
        </div>

        <div class="form-buttons">
          <button type="button" class="btn btn-cancel" onclick="closeWriteModal()">취소</button>
          <button type="submit" class="btn btn-submit">등록</button>
        </div>
      </form>
    </div>
  </div>

  <div id="detail-modal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <div>
            <div id="detail-title" style="font-size: 18pt; font-weight: bold;"></div>
            <div id="display-subtitle" class="detail-subtitle"></div>
        </div>
        <button class="close-btn" onclick="closeDetailModal()">✕</button>
      </div>
      <div id="detail-body">
        <div class="display-content">
          <div id="display-image-list" class="detail-image-list"></div> <div class="detail-text-area">
            <div id="display-content" class="detail-content"></div>
          </div>
        </div>
        <div class="detail-buttons">
          <button class="btn btn-back" onclick="closeDetailModal()">닫기</button>
          <span id="admin-controls" style="display:none;">
            <button id="edit-btn-placeholder" class="btn btn-edit">수정</button>
            <button id="delete-btn-placeholder" class="btn btn-delete">삭제</button>
          </span>
        </div>
      </div>
    </div>
  </div>
</main>

<script type="module">
  // js에서 설정을 가져옵니다. (경로 주의)
  import { firebaseConfig } from "../script/firebase-config.js";
  // 공통 기능 가져오기
  import { getUserRole, linkify, setupModalOutsideClick, setupSearch } from "../script/auth-utils.js";
  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, serverTimestamp, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // 이 게시판이 사용할 데이터베이스 이름
  const DB_NAME = 'imgbackup_posts';

  let currentUser = null;
  let editingPostId = null;
  let allPosts = {};

  // 이미지 입력창 관리
  window.addImageInput = (value = '') => {
    const container = document.getElementById('image-input-container');
    const div = document.createElement('div');
    div.className = 'image-input-item';
    div.innerHTML = `
      <input type="url" class="post-image-url" placeholder="https://" value="${value}">
      <button type="button" class="btn-remove-img" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(div);
  };

  onAuthStateChanged(auth, async (user) => {
    const writeBtn = document.getElementById('write-btn');
    if (user) {
      const role = await getUserRole(db, user.uid); 
      currentUser = { uid: user.uid, role: role };
      writeBtn.style.display = role === 'admin' ? 'block' : 'none';
    } else {
      currentUser = null;
      writeBtn.style.display = 'none';
    }
    loadPosts();
  });

  window.openWriteModal = () => {
    editingPostId = null;
    document.getElementById('modal-title').textContent = '새 글쓰기';
    document.getElementById('post-title').value = '';
    document.getElementById('post-subtitle').value = '';
    document.getElementById('post-content').value = '';
    document.getElementById('image-input-container').innerHTML = '';
    addImageInput(); // 기본 입력창 하나 추가
    document.getElementById('write-modal').classList.add('active');
  };

  window.closeWriteModal = () => document.getElementById('write-modal').classList.remove('active');

  window.openEditModal = (postId) => {
    const post = allPosts[postId];
    editingPostId = postId;
    document.getElementById('modal-title').textContent = '글 수정하기';
    document.getElementById('post-title').value = post.title || '';
    document.getElementById('post-subtitle').value = post.subtitle || '';
    document.getElementById('post-content').value = post.content || '';
    
    const container = document.getElementById('image-input-container');
    container.innerHTML = '';
    if (post.imageUrls && post.imageUrls.length > 0) {
      post.imageUrls.forEach(url => addImageInput(url));
    } else if (post.imageUrl) { // 하위 호환성 (기존 단일 이미지)
      addImageInput(post.imageUrl);
    } else {
      addImageInput();
    }
    
    closeDetailModal();
    document.getElementById('write-modal').classList.add('active');
  };

  window.handleSavePost = async (event) => {
    event.preventDefault();
    
    // 다중 이미지 URL 수집
    const urlInputs = document.querySelectorAll('.post-image-url');
    const imageUrls = Array.from(urlInputs).map(input => input.value).filter(url => url.trim() !== '');

    const data = {
      title: document.getElementById('post-title').value,
      subtitle: document.getElementById('post-subtitle').value,
      content: document.getElementById('post-content').value,
      imageUrls: imageUrls,
      updatedAt: serverTimestamp()
    };

    try {
      if (editingPostId) {
        await updateDoc(doc(db, DB_NAME, editingPostId), data);
      } else {
        await addDoc(collection(db, DB_NAME), { ...data, createdAt: serverTimestamp(), userId: currentUser.uid });
      }
      closeWriteModal();
    } catch (e) { alert(e.message); }
  };

// 1. 화면에 글 목록을 그려주는 전용 함수 (검색 결과도 이걸로 그려요!)
  function renderPostList(posts) {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = ''; // 일단 화면을 깨끗이 비웁니다.
    const template = document.getElementById('post-card-template');

    posts.forEach((post) => {
      const card = template.content.cloneNode(true);
      const cardDiv = card.querySelector('.post-card');
      
      card.querySelector('.main-title').textContent = post.title;
      card.querySelector('.main-subtitle').textContent = post.subtitle || '';

      const thumb = card.querySelector('.post-thumbnail');
      // 이미지가 있으면 보여주고, 없으면 첫 글자를 보여줍니다.
      if (post.imageUrl) {
        thumb.innerHTML = `<img src="${post.imageUrl}" onerror="this.src='https://via.placeholder.com/150'">`;
      } else {
        const initials = (post.title || 'Text').charAt(0).toUpperCase();
        thumb.innerHTML = `<div class="post-thumbnail-placeholder">${initials}</div>`;
      }

      cardDiv.onclick = () => openDetailModal(post.id);
      gallery.appendChild(cardDiv);
    });
  }

  // 2. 파이어베이스에서 데이터를 실시간으로 가져오는 함수
  window.loadPosts = () => {
    const q = query(collection(db, DB_NAME), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
      allPosts = {}; // 전체 데이터를 담을 변수 초기화
      snapshot.forEach((docSnap) => {
        const post = { ...docSnap.data(), id: docSnap.id };
        allPosts[post.id] = post;
      });
      
      // [중요] 데이터를 다 가져오면 화면에 전체 목록을 그립니다.
      renderPostList(Object.values(allPosts));
      
      // [추가] 이제 검색 기능을 연결합니다. (외부 함수 호출)
      setupSearch(allPosts, renderPostList);
    });
  };
  

  window.openDetailModal = (postId) => {
    const post = allPosts[postId];
    const isAdmin = currentUser && currentUser.role === 'admin';

    document.getElementById('detail-title').textContent = post.title;
    document.getElementById('display-subtitle').textContent = post.subtitle || '';
    document.getElementById('display-content').innerHTML = linkify(post.content || '');

    const imgContainer = document.getElementById('display-image-list');
    imgContainer.innerHTML = '';
    
    const urls = post.imageUrls || (post.imageUrl ? [post.imageUrl] : []);
    if (urls.length > 0) {
      urls.forEach(url => {
        const img = document.createElement('img');
        img.src = url;
        img.className = 'detail-image';
        imgContainer.appendChild(img);
      });
    }

    const controls = document.getElementById('admin-controls');
    controls.style.display = isAdmin ? 'inline-block' : 'none';
    if (isAdmin) {
      document.getElementById('edit-btn-placeholder').onclick = () => openEditModal(postId);
      document.getElementById('delete-btn-placeholder').onclick = () => deletePost(postId);
    }

    document.getElementById('detail-modal').classList.add('active');
  };

  window.closeDetailModal = () => document.getElementById('detail-modal').classList.remove('active');

  window.deletePost = async (id) => {
    if (confirm('삭제하시겠습니까?')) {
      await deleteDoc(doc(db, DB_NAME, id));
      closeDetailModal();
    }
  };

// 모달 바깥쪽(배경) 클릭 시 닫기
 setupModalOutsideClick('write-modal', 'detail-modal', window.closeWriteModal, window.closeDetailModal);
  
  document.getElementById('write-btn').onclick = openWriteModal;
</script>
