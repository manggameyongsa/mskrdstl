<link rel="stylesheet" href="../styles/common.css">
<style>
  .board-header { display: flex; justify-content: space-between; align-items: center;}
  .guestbook-item { 
    background: var(--post-item-background-color); 
    padding: 20px; 
    border-bottom: 1px solid #ddd; 
    margin-bottom: 10px;
  }
  .author-info { font-weight: bold; color: var(--color-dark); margin-bottom: 10px; font-size: 10pt; }
  .guest-content { white-space: pre-wrap; line-height: 1.6; }
  
  /* 모달 스타일은 기존과 동일하게 유지 */
  .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: var(--modal-back-color); }
  .modal.active { display: flex; justify-content: center; align-items: center; }
</style>

<main>
  <div class="board-header">
    <h1>방명록</h1>
    <button id="write-btn" class="write-btn" style="display:none;">방명록 남기기</button>
  </div>

  <div class="search-container" style="display: flex; gap: 10px; margin-bottom: 20px;">
    <input type="text" id="search-input" placeholder="작성자 또는 내용 검색..." style="flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
    <button id="search-btn" class="btn" style="padding: 10px 20px; background-color: var(--color-dark); color: white; border: none; cursor: pointer;">검색</button>
  </div>

  <div id="guestbook-list" class="gallery"></div>

  <template id="guest-template">
    <div class="guestbook-item">
      <div class="author-info">
        <span class="author-name">비공개 유저</span> 
        <span class="post-date" style="font-weight: normal; margin-left: 10px; color: #999;"></span>
      </div>
      <div class="guest-content"></div>
      <div class="admin-controls" style="display:none; margin-top: 10px; justify-content: flex-end; gap: 10px;">
        <button class="btn btn-delete" style="padding: 5px 10px; font-size: 9pt;">삭제</button>
      </div>
    </div>
  </template>

  <div id="write-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>방명록 작성</h2>
        <button class="close-btn" onclick="closeWriteModal()">✕</button>
      </div>
      <form onsubmit="handleSaveGuest(event)">
        <div class="form-group">
          <label>내용 *</label>
          <textarea id="guest-content" required style="min-height: 150px;" placeholder="따뜻한 한마디를 남겨주세요!"></textarea>
        </div>
        <div class="form-buttons" style="display: flex; gap: 10px; justify-content: flex-end;">
          <button type="button" class="btn btn-cancel" onclick="closeWriteModal()">취소</button>
          <button type="submit" class="btn btn-submit">등록</button>
        </div>
      </form>
    </div>
  </div>
</main>

<script type="module">
  import { firebaseConfig } from "../script/firebase-config.js";
  import { getUserRole, linkify, setupModalOutsideClick, setupSearch } from "../script/auth-utils.js";
  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const DB_NAME = 'guestbook'; 

  let currentUser = null;
  let allPosts = {};

  // 1. 로그인 상태 확인 및 유저 정보 저장
  onAuthStateChanged(auth, async (user) => {
    const writeBtn = document.getElementById('write-btn');
    if (user) {
      const role = await getUserRole(db, user.uid);
      
      // [중요] 여기서 displayName(닉네임)을 챙겨둬야 글 쓸 때 이름이 나옵니다.
      currentUser = { 
        uid: user.uid, 
        role: role, 
        email: user.email,
        displayName: user.displayName 
      };
      
      writeBtn.style.display = 'block';
    } else {
      currentUser = null;
      writeBtn.style.display = 'none';
    }
    loadGuests();
  });

  // 2. 글쓰기 모달 제어
  window.openWriteModal = () => {
    document.getElementById('guest-content').value = '';
    document.getElementById('write-modal').classList.add('active');
  };

  window.closeWriteModal = () => document.getElementById('write-modal').classList.remove('active');

  // 3. 방명록 저장 기능
  window.handleSaveGuest = async (event) => {
    event.preventDefault();
    if(!currentUser) return alert("로그인이 필요합니다.");

    const data = {
      content: document.getElementById('guest-content').value,
      userId: currentUser.uid,
      // [핵심] 로그인한 유저의 닉네임을 사용합니다. 없으면 '익명'
      nickname: currentUser.displayName || '익명', 
      createdAt: serverTimestamp()
    };

    try {
      await addDoc(collection(db, DB_NAME), data);
      closeWriteModal();
    } catch (e) { alert(e.message); }
  };

  // 4. 화면에 글 목록 그리기
  function renderGuestList(guests) {
    const list = document.getElementById('guestbook-list');
    list.innerHTML = '';
    const template = document.getElementById('guest-template');

    guests.forEach((item) => {
      const el = template.content.cloneNode(true);
      
      // 저장된 닉네임이 있으면 닉네임을, 없으면 예전 방식인 이메일을 보여줍니다.
      el.querySelector('.author-name').textContent = item.nickname || item.userEmail || '익명';
      el.querySelector('.guest-content').innerHTML = linkify(item.content);
      
      if (item.createdAt) {
        const date = item.createdAt.toDate();
        el.querySelector('.post-date').textContent = date.toLocaleDateString();
      }

      // 본인 글이거나 관리자일 때만 삭제 버튼 노출
      if (currentUser && (currentUser.role === 'admin' || currentUser.uid === item.userId)) {
        const controls = el.querySelector('.admin-controls');
        controls.style.display = 'flex';
        el.querySelector('.btn-delete').onclick = () => deleteGuest(item.id);
      }

      list.appendChild(el);
    });
  }

  // 5. 데이터 실시간 불러오기
  window.loadGuests = () => {
    const q = query(collection(db, DB_NAME), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
      allPosts = {}; 
      snapshot.forEach((docSnap) => {
        const post = { ...docSnap.data(), id: docSnap.id };
        allPosts[post.id] = post;
      });
      
      renderGuestList(Object.values(allPosts));
      setupSearch(allPosts, renderGuestList);
    });
  };

  // 6. 삭제 기능
  window.deleteGuest = async (id) => {
    if (confirm('이 방명록을 삭제하시겠습니까?')) {
      await deleteDoc(doc(db, DB_NAME, id));
    }
  };

  // 7. 초기 설정
  setupModalOutsideClick('write-modal', null, window.closeWriteModal, () => {});
  document.getElementById('write-btn').onclick = openWriteModal;
</script>
